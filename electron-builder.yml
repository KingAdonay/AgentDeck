# Packaging config. All runtime code is bundled by electron-vite into out/,
# so the asar contains only that plus package.json — no node_modules.
appId: dev.agentdeck.app
productName: AgentDeck
directories:
  buildResources: build
  output: dist
files:
  - out/**
extraResources:
  - from: resources
    to: resources
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

win:
  target: nsis

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Adonay Eshetu <adonayeshetu2@gmail.com>

publish:
  provider: github
