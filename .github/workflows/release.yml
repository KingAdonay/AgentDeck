name: Release

# Tag a version to cut a release:  git tag v0.2.0 && git push --tags
# electron-builder uploads platform artifacts to a draft GitHub release
# via the repo's GITHUB_TOKEN; review and publish the draft by hand.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package and upload to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

      - name: Upload artifacts to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: agentdeck-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
